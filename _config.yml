# =====================================================
# SITE SETTINGS
# =====================================================
title: "Barath Krishna"
description: "Robotics researcher at CMU | Planning, Control, and Perception"
url: "https://barathkrishna777.github.io"
baseurl: ""

# =====================================================
# THEME
# =====================================================
remote_theme: alshedivat/al-folio
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# =====================================================
# AUTHOR PROFILE
# =====================================================
author:
  name: "Barathkrishna Satheeshkumar"
  avatar: "/assets/images/profile.jpg"   # add later if you want
  bio: "Robotics researcher @ CMU, focusing on motion planning, control, and perception."
  location: "Pittsburgh, PA, USA"
  email: "barathkrishna1201@gmail.com"
  github: "barathkrishna777"
  linkedin: "barathkrishnas"

# =====================================================
# LAYOUTS & NAVIGATION
# =====================================================
collections:
  pages:
    output: true

include:
  - _pages

# Load navigation from external YAML
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      author_profile: true

# =====================================================
# MARKDOWN / BUILD
# =====================================================
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge
